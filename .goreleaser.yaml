version: 2
project_name: noti
builds:
  - main: ./cmd/noti
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
checksum:
  name_template: checksums.txt
changelog:
  sort: asc
